<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>World</title>
  </head>

  <body onload="main()">
      
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>
    <p>

    <p id="numdot">XXX</p>

    <p>
    Camera Angle <input type="range" min="0" max="90" value="5" class="slider" id="angleSlide">
    <p>

    <strong>Sliders</strong>
    <p>
    Legs <input type="range" min="-30" max="30" value="0" class="slider" id="legSlide">
    <p>
    Bottom Neck <input type="range" min="-15" max="15" value="0" class="slider" id="bottomNeck">
    <p>
    Top Neck <input type="range" min="-15" max="15" value="0" class="slider" id="topNeck">
    <p>
    Tail <input type="range" min="-30" max="30" value="0" class="slider" id="tailSlide">
    <p>

    <strong>Animation</strong>
    <p>
    <button type="button" id="animationWalkOffButton">Walk Off</button>
    <button type="button" id="animationWalkOnButton">Walk On</button>
    <p>
    <button type="button" id="animationIdleOffButton">Idle Off</button>
    <button type="button" id="animationIdleOnButton">Idle On</button>
      
    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix.js"></script>
    <script src="Circle.js"></script>
    <script src="Triangle.js"></script>
    <script src="Point.js"></script>
    <script src="Cube.js"></script>
    <script src="Cylinder.js"></script>
    <script src="Camera.js"></script>
    <script src="World.js"></script>
  </body>
</html>
